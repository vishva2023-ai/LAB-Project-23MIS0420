<!DOCTYPE html>
<html>
<head>
    <title>CI/CD Demo</title>
    <style>
        body {
            text-align: center;
            font-family: "Times New Roman", Times, serif;
            background-color: #af0d0d;
            color: white;
        }
        h1 {
            color: #0ef777;
        }
    </style>
</head>
<body>
    <h1>CI/CD Pipeline Working</h1>
    <h2>Deployed using Jenkins + Docker + Kubernetes</h2>
    <p>This webpage is automatically deployed using a CI/CD pipeline.</p>
    
    <!-- To satisfy point 'c' of your prompt, I have added a script to handle the movie rating -->
    <h3>Movie Rating Feature</h3>
    <p id="movie-text">Loading movie data...</p>

    <script>
        // Example function to fulfill "To print rating of a movie"
        function printMovieRating(name, rating) {
            document.getElementById("movie-text").innerHTML = `The rating for the movie <strong>${name}</strong> is <strong>${rating}/10</strong>.`;
        }
        
        // Outputting dummy data
        printMovieRating("Inception", "8.8");
    </script>
</body>
</html>
